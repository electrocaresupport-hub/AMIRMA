<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMIRMA AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="header">
<h1>AMIRMA</h1>
<div id="clock"></div>
</div>

<div class="container">

<div class="panel">
<h2>Weather</h2>
<p>Agartala, India</p>
</div>

<div class="ai-face">
<div class="circle"></div>
<h2>Hello Sir</h2>
</div>

<div class="panel">
<h2>System Status</h2>
<p>CPU: Active</p>
<p>RAM: Monitoring</p>
<p>Network: Connected</p>
</div>

</div>

<div class="apps">
<h2>Applications</h2>

<button onclick="window.open('https://youtube.com')">YouTube</button>

<button onclick="window.open('https://google.com')">Google</button>

<button onclick="window.open('https://chatgpt.com')">ChatGPT</button>

</div>

<script src="script.js"></script>

</body>
</html>
