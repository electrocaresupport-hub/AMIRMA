<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMIRMA | ULTIMATE EDITION</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="particle-canvas"></canvas>

    <div id="boot-screen" class="boot-screen">
        <div class="boot-loader">
            <h1 class="glow-text">AMIRMA</h1>
            <div class="boot-terminal" id="boot-terminal"></div>
            <div class="boot-progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        </div>
    </div>

    <div id="desktop-env" class="desktop-env hidden">
        <header class="top-bar">
            <div class="system-status-left">
                <span class="status-node pulse-glow"></span>
                <span class="brand-title">AMIRMA // CORE v1.0</span>
            </div>
            <div class="system-status-right">
                <span id="sys-date">--/--/----</span>
                <span id="sys-time">00:00:00</span>
            </div>
        </header>

        <main class="desktop-surface">
            <div class="desktop-shortcuts">
                <button class="shortcut-btn" onclick="openApp('mission-control')">
                    <div class="shortcut-icon">🎯</div>
                    <span class="shortcut-label">Mission Control</span>
                </button>
                <button class="shortcut-btn" onclick="openApp('chat-center')">
                    <div class="shortcut-icon">🧠</div>
                    <span class="shortcut-label">AI Chat Center</span>
                </button>
                <button class="shortcut-btn" onclick="openApp('employee-center')">
                    <div class="shortcut-icon">💼</div>
                    <span class="shortcut-label">AI Workforce</span>
                </button>
                <button class="shortcut-btn" onclick="openApp('sys-monitor')">
                    <div class="shortcut-icon">📊</div>
                    <span class="shortcut-label">System Monitor</span>
                </button>
            </div>

            <div id="window-container"></div>

            <div class="ai-core-container" id="ai-core-trigger">
                <div class="hologram-ring ring-outer"></div>
                <div class="hologram-ring ring-mid"></div>
                <div class="hologram-ring ring-inner"></div>
                <div class="core-center">
                    <svg class="hud-svg" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="40" stroke="rgba(0, 238, 255, 0.2)" stroke-width="1" fill="none" />
                        <path d="M 50 10 A 40 40 0 0 1 90 50" stroke="#00eeff" stroke-width="2" fill="none" class="hud-path-rotate" />
                    </svg>
                </div>
                <span class="core-status-text">CORE ACTIVE</span>
            </div>
        </main>

        <footer class="taskbar">
            <button class="start-menu-btn" id="start-btn">⚡ AMIRMA</button>
            <div class="active-apps-tray" id="taskbar-apps"></div>
            <div class="voice-trigger-wrapper">
                <button class="voice-btn" id="voice-toggle-btn" title="Toggle Voice Recognition">
                    <span class="voice-mic-icon">🎤</span>
                </button>
            </div>
        </footer>

        <div id="start-menu" class="start-menu hidden">
            <div class="start-header">EXECUTIVE CMD</div>
            <div class="start-grid">
                <div class="start-item" onclick="openApp('mission-control')">🎯 Mission Control</div>
                <div class="start-item" onclick="openApp('chat-center')">🧠 Chat Center</div>
                <div class="start-item" onclick="openApp('employee-center')">💼 Workforce</div>
                <div class="start-item" onclick="openApp('sys-monitor')">📊 Monitor</div>
                <div class="start-item" onclick="openApp('weather-hub')">🌤️ Weather</div>
                <div class="start-item" onclick="openApp('settings-panel')">⚙️ Settings</div>
            </div>
        </div>
    </div>
</body>
</html>
